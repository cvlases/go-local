<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: store the path then redirect to index
    var path = window.location.pathname.replace('/go-local', '') || '/';
    sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash);
    window.location.replace('/go-local/');
  </script>
</head>
<body></body>
</html>
